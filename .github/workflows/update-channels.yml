name: Auto Update IPTV Channels

on:
  schedule:
    - cron: "0 */6 * * *"   # every 6 hours
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 18

      - run: npm install

      - run: node scripts/fetch_channels.js

      - run: |
          git config user.name "ip-tv-bot"
          git config user.email "bot@users.noreply.github.com"
          git add src/data/channels.json data/health-cache.json
          git commit -m "chore: auto refresh IPTV links" || echo "No changes"
          git push
