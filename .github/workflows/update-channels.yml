name: Update IPTV Channels

on:
  schedule:
    - cron: "0 */6 * * *" # every 6 hours
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 18

      - run: npm install

      - run: node scripts/fetch_channels.js

      - run: |
          git config user.name "auto-bot"
          git config user.email "bot@github.com"
          git add data/channels.json
          git commit -m "chore: auto update channels" || echo "No changes"
          git push
